# Armored Core VI Archipelago - connection settings
# Edit these to match your room, save, then relaunch.
#   host     = server address (e.g. archipelago.gg or localhost)
#   port     = room port number
#   slot     = your slot name, exactly as in your YAML
#   password = room password, or leave blank
host=localhost
port=38281
slot=Player1
password=

#   ui_scale = size of the overlay + F8 settings window.
#              1.0 = default. Try 1.5, 2.0, 3.0 for bigger.
ui_scale=1.0
